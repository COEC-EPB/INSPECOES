<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Processamento</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  text-align: center;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.ipeo { background: #22c55e; }
.ponto { background: #3b82f6; }
.voltar { background: #64748b; }

input {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
}

#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">

  <!-- 🔹 MENU -->
  <div id="menu">
    <h2>⚙️ Sistema</h2>

    <button class="ipeo" onclick="mostrar('ipeo')">📊 Processador IPEO</button>
    <button class="ponto" onclick="mostrar('ponto')">⏱️ Processador de Ponto</button>
  </div>


  <!-- 🔹 IPEO -->
  <div id="ipeo" style="display:none;">
    <h2>📊 Processador IPEO</h2>

    <label>📂 Arquivos MIP</label>
    <input type="file" id="meses" multiple>

    <label>📂 Arquivo IPEO</label>
    <input type="file" id="ipeoFile">

    <button class="ipeo" onclick="enviar()">Processar</button>
    <button class="voltar" onclick="voltar()">⬅ Voltar</button>

    <div id="status"></div>
  </div>


  <!-- 🔹 PONTO -->
  <div id="ponto" style="display:none;">
    <h2>⏱️ Processador de Ponto</h2>

    <p>🚧 Em desenvolvimento...</p>

    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

</div>


<script>
// 🔄 troca de tela
function mostrar(tela) {
  document.getElementById("menu").style.display = "none";
  document.getElementById(tela).style.display = "block";
}

function voltar() {
  document.getElementById("menu").style.display = "block";
  document.getElementById("ipeo").style.display = "none";
  document.getElementById("ponto").style.display = "none";
}


// 🚀 envio IPEO
async function enviar() {

  const meses = document.getElementById("meses").files;
  const ipeo = document.getElementById("ipeoFile").files[0];
  const status = document.getElementById("status");

  if (meses.length === 0 || !ipeo) {
    alert("Envie todos os arquivos");
    return;
  }

  const formData = new FormData();

  for (let i = 0; i < meses.length; i++) {
    formData.append("meses", meses[i]);
  }

  formData.append("ipeo", ipeo);

  try {
    status.innerText = "⏳ Processando...";

    const res = await fetch("https://servi-os-online-production.up.railway.app/processar", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("Erro na API");

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "resultado.xlsx";
    a.click();

    status.innerText = "✅ Concluído!";

  } catch (err) {
    status.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
